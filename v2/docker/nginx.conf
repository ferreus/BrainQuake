# Serves the built web frontend and reverse-proxies /api/ to the api
# service on the docker-compose network. Lets the whole stack be reached
# through a single published port -- the browser only ever talks to nginx,
# using whatever host/IP it used to load the page, so it works the same
# from localhost or from a different machine on the network.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
